name: Backup Notify Templates

on:
  push:

jobs:
  backup-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: templates
        run: npm ci

      - name: Run backup script
        working-directory: templates
        env:
          NOTIFY_TEMPLATE_BACKUP_API_KEY: ${{ secrets.NOTIFY_TEMPLATE_BACKUP_API_KEY }}
          NOTIFY_TEMPLATE_IDS: '{"email_template": "2eb60081-37da-433e-8f1d-c580a5e66456", "letter_template": "1805cff7-2f44-4598-a4bb-1635957d5f2d"}'
        run: npm run backup

      - name: Create PR if templates changed
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No file changes, skipping PR."
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          BRANCH="backup-notify-templates-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add templates/backups/
          git commit -m "Backup Notify templates"
          git push origin "$BRANCH"
          PR_BODY=$(cat <<'EOF'
          Automated backup of GOV.UK Notify templates.

          If the changes found to templates in Notify are expected, this PR should be merged to back up Notify template history into git history.

          If these changes are not expected, live communications to electors may be affected. See the [documentation](https://mhclgdigital.atlassian.net/wiki/spaces/ED1/pages/961413213/GOV+Notify+the+Notifications+API) and notify your technical lead.
          EOF
          )
          PR_URL=$(gh pr create \
            --title "Backup Notify templates" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_TODO_CHECKER_ALERTS_WEBHOOK }}
        run: |
          if [ "${{ job.status }}" = "failure" ]; then
            MESSAGE="❌ Notify template backup workflow failed — check the run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "${{ steps.create-pr.outputs.changes_detected }}" = "true" ]; then
            MESSAGE="🚨 Notify template changes detected — please review urgently: ${{ steps.create-pr.outputs.pr_url }}"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MESSAGE\"}"
